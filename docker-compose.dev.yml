services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app
      - ./openapi.yaml:/app/openapi.yaml
      - backend_node_modules:/app/node_modules
    command: npm run dev
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
      - OPENAPI_SPEC_PATH=/app/openapi.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - COMMONS_OAUTH_TOKEN=${COMMONS_OAUTH_TOKEN:-}
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: npm run dev
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:
