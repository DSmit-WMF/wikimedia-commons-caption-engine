# Reuse same env anchors as prod so dev overrides (target, volumes, command) stay minimal.
x-backend-env: &backend-env
  PORT: "3002"
  NODE_ENV: development
  OPENAPI_SPEC_PATH: /app/openapi.yaml
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-}
  COMMONS_OAUTH_TOKEN: ${COMMONS_OAUTH_TOKEN:-}

x-frontend-env: &frontend-env
  PORT: "3003"
  NEXT_PUBLIC_API_URL: http://localhost:3002

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app
      - ./openapi.yaml:/app/openapi.yaml
      - backend_node_modules:/app/node_modules
    command: sh -c "if [ ! -f node_modules/.bin/tsx ]; then npm ci; fi && npm run dev"
    ports:
      - "3002:3002"
    environment: *backend-env
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "if [ ! -f node_modules/.bin/next ]; then npm ci; fi && npm run dev"
    ports:
      - "3003:3003"
    environment: *frontend-env
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
