# Shared env for backend (used in both prod and dev compose).
x-backend-env: &backend-env
  PORT: "3002"
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-}
  COMMONS_OAUTH_TOKEN: ${COMMONS_OAUTH_TOKEN:-}

x-frontend-env: &frontend-env
  PORT: "3003"
  HOSTNAME: "0.0.0.0"
  NEXT_PUBLIC_API_URL: http://localhost:3002

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment: *backend-env
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment: *frontend-env
    depends_on:
      - backend
