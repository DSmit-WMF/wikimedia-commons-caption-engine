services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - COMMONS_OAUTH_TOKEN=${COMMONS_OAUTH_TOKEN:-}
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    depends_on:
      - backend
